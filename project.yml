name: NexTrade
schemes:
  NexTrade:
    build:
      targets:
        NexTrade: all
    test:
      targets:
        - NexTradeUITests
options:
  bundleIdPrefix: com.nextrade
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  NexTrade:
    type: application
    platform: iOS
    sources:
      - NexTrade
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nextrade.app
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: NexTrade/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  NexTradeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - NexTradeUITests
    dependencies:
      - target: NexTrade
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nextrade.app.uitests
        GENERATE_INFOPLIST_FILE: YES
